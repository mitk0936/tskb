      #app {

      /* Content row: canvas + panel side-by-side, below the fixed toolbar */

      }

      #toolbar .brand {

        display: none;

      #toolbar .sep {

        padding: 0 4px 0 12px;
        gap: 2px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      #search-bar:focus-within {
        border-color: #1a76c2;
        box-shadow: 0 0 0 3px #1a76c222;
        background: #fff;
      }
      #search-icon {
        font-size: 14px;
        color: #94a3b8;
        flex-shrink: 0;
        pointer-events: none;
      }
      #search-input {

        border: none;
        outline: none;
        color: #1e293b;
        font-size: 12px;
        padding: 5px 4px;
        width: 170px;
      }
      #search-input::placeholder {
        color: #94a3b8;
      }
      #search-chip {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #cce0f2;
        color: #004880;
        border-radius: 999px;
        padding: 3px 8px 3px 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
        flex-shrink: 0;
      }
      #search-chip[hidden] {
        display: none;
      }
      #search-chip.chip-searching {
        animation: chip-pulse 0.9s ease-in-out infinite;
      }
      @keyframes chip-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      #search-chip.chip-searching .chip-close {
        display: none;
      }
      .chip-close {
        background: none;
        border: none;
        cursor: pointer;
        color: #004880;
        font-size: 11px;
        line-height: 1;
        padding: 2px 3px;
        border-radius: 999px;
        transition:
          background 0.12s,
          color 0.12s;
      }
      .chip-close:hover {
        background: #fee2e2;
        color: #ef4444;
      }
      #search-btn {
        background: #1a76c2;
        border: none;
        border-radius: 999px;
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.03em;
        padding: 4px 12px;
        cursor: pointer;
        flex-shrink: 0;

      #search-btn:hover {
        background: #0057a1;
        transform: scale(1.04);
      }
      #search-btn:active {
        transform: scale(0.97);
      }

        }

        font-size: 11px;
        color: #94a3b8;
        margin-left: auto;
      }

      /* Canvas — flex child, fills remaining width */
      #canvas {

      /* Spinner */
      #global-spinner {
        position: fixed;
        inset: 0;
        background: rgba(248, 250, 252, 0.92);

      }

    <div id="app">

            <div id="doc-panel-actions" class="header-actions"></div>
          </div>
          <div id="doc-panel-body"></div>
        </div>
      </div>

      <!-- Global spinner -->
      <div id="global-spinner">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" fill="none" stroke="#e2e8f0" stroke-width="3" />
          <circle

            cy="20"
            r="16"
            fill="none"
            stroke="#1a76c2"

        <span class="spin-text">Loading graph…</span>
      </div>
