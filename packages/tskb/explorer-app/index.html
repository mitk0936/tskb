<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tskb Explorer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
        background: #0f0f1a;
        color: #e2e8f0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      /* Toolbar */
      #toolbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 44px;
        background: #111827cc;
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        z-index: 100;
      }

      #toolbar .brand {
        font-size: 13px;
        font-weight: 700;
        color: #3b82f6;
        letter-spacing: 0.05em;
      }

      #toolbar .sep { width: 1px; height: 20px; background: #1e293b; }

      #search-input {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 12px;
        padding: 4px 10px;
        width: 220px;
        outline: none;
      }
      #search-input::placeholder { color: #475569; }
      #search-input:focus { border-color: #3b82f6; }

      #stats {
        font-size: 11px;
        color: #475569;
        margin-left: auto;
      }

      /* Canvas */
      #canvas {
        position: absolute;
        top: 44px;
        left: 0;
        width: 100%;
        height: calc(100vh - 44px);
      }

      /* Detail panel */
      #detail-panel {
        position: fixed;
        top: 44px; right: 0;
        width: 300px;
        height: calc(100vh - 44px);
        background: #111827;
        border-left: 1px solid #1e293b;
        overflow-y: auto;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        z-index: 90;
      }
      #detail-panel.open { transform: translateX(0); }

      #detail-panel .panel-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #1e293b;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #detail-panel .type-badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      #detail-panel .panel-title {
        font-size: 13px;
        font-weight: 700;
        color: #f1f5f9;
        word-break: break-all;
      }

      #detail-panel .close-btn {
        margin-left: auto;
        background: none;
        border: none;
        color: #475569;
        cursor: pointer;
        font-size: 16px;
        padding: 2px 4px;
      }
      #detail-panel .close-btn:hover { color: #94a3b8; }

      #detail-panel .panel-body {
        padding: 12px 16px;
      }

      #detail-panel .field {
        margin-bottom: 12px;
      }

      #detail-panel .field-label {
        font-size: 10px;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 3px;
      }

      #detail-panel .field-value {
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.5;
        word-break: break-word;
      }

      #detail-panel .field-value code {
        background: #1e293b;
        padding: 1px 4px;
        border-radius: 3px;
        font-family: monospace;
        font-size: 11px;
      }

      #detail-panel .sketch-note {
        margin-top: 16px;
        padding: 10px 12px;
        background: #1e293b;
        border-radius: 6px;
        border: 1px dashed #334155;
        font-size: 11px;
        color: #475569;
        font-style: italic;
      }

      /* Spinner */
      #global-spinner {
        position: fixed;
        inset: 0;
        background: #0f0f1acc;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        flex-direction: column;
        gap: 12px;
      }
      #global-spinner.hidden { display: none; }
      #global-spinner .spin-text {
        font-size: 12px;
        color: #475569;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Toolbar -->
      <div id="toolbar">
        <span class="brand">tskb explorer</span>
        <div class="sep"></div>
        <input id="search-input" type="text" placeholder="Search nodes…" />
        <span id="stats"></span>
      </div>

      <!-- SVG Canvas (injected by main.ts) -->
      <svg id="canvas"></svg>

      <!-- Detail Panel -->
      <div id="detail-panel">
        <div class="panel-header">
          <span class="type-badge" id="dp-type-badge"></span>
          <span class="panel-title" id="dp-title"></span>
          <button class="close-btn" id="dp-close">✕</button>
        </div>
        <div class="panel-body" id="dp-body"></div>
      </div>

      <!-- Global spinner -->
      <div id="global-spinner">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" fill="none" stroke="#1e293b" stroke-width="3"/>
          <circle cx="20" cy="20" r="16" fill="none" stroke="#3b82f6" stroke-width="3"
            stroke-dasharray="50 50" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate"
              from="0 20 20" to="360 20 20" dur="0.8s" repeatCount="indefinite"/>
          </circle>
        </svg>
        <span class="spin-text">Loading graph…</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
