<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&lt;tskb&gt; Explorer</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
        background: #f8fafc;
        color: #1e293b;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        user-select: none;
      }

      input {
        user-select: text;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Content row: canvas + panel side-by-side, below the fixed toolbar */
      #content-row {
        display: flex;
        flex: 1;
        min-height: 0;
        margin-top: 44px;
        overflow: hidden;
      }

      /* Toolbar */
      #toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        background: #ffffffcc;
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        z-index: 100;
      }

      #toolbar .brand {
        font-size: 13px;
        font-weight: 700;
        color: #2563eb;
        letter-spacing: 0.05em;
      }

      #toolbar .sep {
        width: 1px;
        height: 20px;
        background: #e2e8f0;
      }

      #search-input {
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        color: #1e293b;
        font-size: 12px;
        padding: 4px 10px;
        width: 220px;
        outline: none;
      }
      #search-input::placeholder {
        color: #94a3b8;
      }
      #search-input:focus {
        border-color: #3b82f6;
      }

      #stats {
        font-size: 11px;
        color: #94a3b8;
        margin-left: auto;
      }

      /* Canvas — flex child, fills remaining width */
      #canvas {
        flex: 1;
        min-width: 0;
      }

      /* Spinner */
      #global-spinner {
        position: fixed;
        inset: 0;
        background: rgba(248, 250, 252, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        flex-direction: column;
        gap: 12px;
      }
      #global-spinner.hidden {
        display: none;
      }
      #global-spinner .spin-text {
        font-size: 12px;
        color: #94a3b8;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Toolbar -->
      <div id="toolbar">
        <span class="brand">&lt;tskb&gt; explorer</span>
        <div class="sep"></div>
        <input id="search-input" type="text" placeholder="Search nodes…" />
        <span id="stats"></span>
      </div>

      <!-- Canvas + panel in a flex row so the panel pushes the canvas -->
      <div id="content-row">
        <!-- SVG Canvas (injected by main.ts) -->
        <svg id="canvas"></svg>

        <!-- Doc / node detail side panel -->
        <div id="doc-panel">
          <div id="doc-panel-header">
            <span id="doc-panel-title"></span>
            <div id="doc-panel-actions" class="header-actions"></div>
          </div>
          <div id="doc-panel-body"></div>
        </div>
      </div>

      <!-- Global spinner -->
      <div id="global-spinner">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" fill="none" stroke="#e2e8f0" stroke-width="3" />
          <circle
            cx="20"
            cy="20"
            r="16"
            fill="none"
            stroke="#3b82f6"
            stroke-width="3"
            stroke-dasharray="50 50"
            stroke-linecap="round"
          >
            <animateTransform
              attributeName="transform"
              type="rotate"
              from="0 20 20"
              to="360 20 20"
              dur="0.8s"
              repeatCount="indefinite"
            />
          </circle>
        </svg>
        <span class="spin-text">Loading graph…</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
